<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExFiles</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="bg-layer"></div>

<div class="titlebar">
  <div class="titlebar-drag">
    <div class="app-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M3 7C3 5.9 3.9 5 5 5H10L12 7H19C20.1 7 21 7.9 21 9V17C21 18.1 20.1 19 19 19H5C3.9 19 3 18.1 3 17V7Z" fill="url(#logoGrad)" stroke="none"/>
        <defs>
          <linearGradient id="logoGrad" x1="3" y1="5" x2="21" y2="19">
            <stop offset="0%" stop-color="#3b3b3b"/>
            <stop offset="100%" stop-color="#a78bfa"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <span class="app-name">ExFiles</span>
  </div>
  <div class="window-controls">
    <button class="wc-btn wc-minimize" onclick="window.api.windowMinimize()" title="Minimize">
      <svg width="10" height="10" viewBox="0 0 10 10"><line x1="0" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1.5"/></svg>
    </button>
    <button class="wc-btn wc-maximize" onclick="window.api.windowMaximize()" title="Maximize">
      <svg width="10" height="10" viewBox="0 0 10 10"><rect x="1" y="1" width="8" height="8" stroke="currentColor" stroke-width="1.5" fill="none" rx="1"/></svg>
    </button>
    <button class="wc-btn wc-close" onclick="window.api.windowClose()" title="Close">
      <svg width="10" height="10" viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5"/></svg>
    </button>
  </div>
</div>

<div class="tabbar">
  <div class="tabs-list" id="tabs-list"></div>
  <button class="tb-btn tab-new-btn" id="btn-new-tab" title="New Tab">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<div class="toolbar">
  <div class="toolbar-left">
    <button class="tb-btn" id="btn-back" title="Back" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <button class="tb-btn" id="btn-forward" title="Forward" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
    <button class="tb-btn" id="btn-up" title="Up">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </button>
    <button class="tb-btn" id="btn-refresh" title="Refresh">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
    </button>
  </div>

  <div class="addressbar-wrap">
    <div class="breadcrumbs" id="breadcrumbs"></div>
    <input class="addressbar" id="addressbar" type="text" spellcheck="false">
  </div>

  <div class="toolbar-right">
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Search…">
    </div>
    <div class="view-toggle">
      <button class="tb-btn view-btn active" id="view-grid" title="Grid view">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
      <button class="tb-btn view-btn" id="view-list" title="List view">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Quick Access</div>
      <ul class="sidebar-list" id="quick-access-list"></ul>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Drives</div>
      <ul class="sidebar-list" id="drives-list"></ul>
    </div>
  </aside>

  <div class="resize-handle" id="resize-handle"></div>

  <main class="content-area" id="content-area">
    <div class="file-grid" id="file-grid"></div>
    <div class="file-list" id="file-list" style="display:none">
      <div class="list-header">
        <div class="lh-name sortable active" data-sort="name">Name <span class="sort-arrow">↑</span></div>
        <div class="lh-size sortable" data-sort="size">Size <span class="sort-arrow"></span></div>
        <div class="lh-type sortable" data-sort="type">Type <span class="sort-arrow"></span></div>
        <div class="lh-date sortable" data-sort="date">Modified <span class="sort-arrow"></span></div>
      </div>
      <div class="list-body" id="list-body"></div>
    </div>
  </main>

  <aside class="details-panel" id="details-panel">
    <div class="details-empty" id="details-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
      <p>Select a file to see details</p>
    </div>
    <div class="details-content" id="details-content" style="display:none">
      <div class="details-icon" id="details-icon"></div>
      <div class="details-name" id="details-name"></div>
      <div class="details-rows" id="details-rows"></div>
    </div>
  </aside>

</div>

<div class="statusbar">
  <span id="status-count">Ready</span>
  <span id="status-selection"></span>
  <span id="status-path"></span>
</div>

<div class="context-menu" id="context-menu">
  <div class="cm-item" id="cm-open">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    Open
  </div>
  <div class="cm-item" id="cm-open-tab">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    Open in New Tab
  </div>
  <div class="cm-divider"></div>
  <div class="cm-item" id="cm-rename">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Rename
  </div>
  <div class="cm-item" id="cm-copy">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    Copy
  </div>
  <div class="cm-item cm-danger" id="cm-delete">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    Delete
  </div>
  <div class="cm-divider"></div>
  <div class="cm-item" id="cm-new-folder">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
    New Folder
  </div>
</div>

<div class="modal-overlay" id="rename-modal" style="display:none">
  <div class="modal">
    <div class="modal-title">Rename</div>
    <input class="modal-input" id="rename-input" type="text">
    <div class="modal-actions">
      <button class="modal-btn modal-cancel" id="rename-cancel">Cancel</button>
      <button class="modal-btn modal-ok" id="rename-ok">Rename</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="newfolder-modal" style="display:none">
  <div class="modal">
    <div class="modal-title">New Folder</div>
    <input class="modal-input" id="newfolder-input" type="text" placeholder="Folder name">
    <div class="modal-actions">
      <button class="modal-btn modal-cancel" id="newfolder-cancel">Cancel</button>
      <button class="modal-btn modal-ok" id="newfolder-ok">Create</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
